<!DOCTYPE html>
<html>

<head>

    <title>Login | Third Eye</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/home.css') }}">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav>

    <div class="logo">
        👁 Third Eye
    </div>

    <ul>
        <li><a href="/">Home</a></li>
        <li><a href="/about">About</a></li>
        <li><a href="/features">Features</a></li>
        <li><a href="/contact">Contact</a></li>
        <li><a href="/register">Register</a></li>
    </ul>

</nav>

<!-- ================= LOGIN ================= -->

<section class="login-section">

    <div class="login-box">

        <h1>Welcome Back</h1>

        <p>Login to continue using Third Eye</p>

        <!-- Error Message -->
        {% if error %}
        <p style="color:red; text-align:center;">
            {{ error }}
        </p>
        {% endif %}

        <form action="/login" method="POST">

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button type="submit" class="btn">
                Login
            </button>

        </form>

        <p class="register-text">
            Don't have an account?
            <a href="/register">Register</a>
        </p>

    </div>

</section>

<!-- ================= FOOTER ================= -->

<footer>

    <h3>Third Eye</h3>

    <p>AI-Based Forensic Text-to-Image Generation System</p>

    <p>© 2026 Third Eye | Final Year Project</p>

</footer>

</body>

</html>
